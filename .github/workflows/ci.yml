name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run npm test
        id: tests
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee npm-test-output.txt
          code=${PIPESTATUS[0]}
          echo "$code" > npm-test-exit-code.txt
          exit "$code"
        continue-on-error: true

      - name: Upload npm test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-test-diagnostics
          path: |
            npm-test-output.txt
            npm-test-exit-code.txt
          if-no-files-found: ignore

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - run: npm run typecheck
