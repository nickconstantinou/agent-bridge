name: Prompt Table Inventory

on:
  pull_request:
    paths:
      - '.github/workflows/prompt-table-inventory.yml'

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inventory prompt retirement and schema version references
        shell: bash
        run: |
          {
            echo '## prompt override implementation and guidance'
            grep -RInEi --exclude-dir=node_modules --exclude-dir=.git 'getPrompt|setPrompt|dbTemplate|includeSupplementsForDbTemplate|CREATE TABLE( IF NOT EXISTS)? prompts|DROP TABLE( IF EXISTS)? prompts|FROM prompts|INTO prompts|prompt_text|prompt[- ]override|prompt override|database rows|DB override|legacy override|override retirement|prompts table' . || true
            echo
            echo '## schema version assumptions'
            grep -RInE --exclude-dir=node_modules --exclude-dir=.git 'CURRENT_SCHEMA_VERSION|user_version[^\n]*1|schema version 1|version 1 database|at 1\b|versioned baseline' src test scripts docs systemd || true
          } | tee prompt-table-inventory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: prompt-table-inventory
          path: prompt-table-inventory.txt
          if-no-files-found: error
