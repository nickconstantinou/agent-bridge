name: Prompt Table Inventory

on:
  pull_request:
    paths:
      - '.github/workflows/prompt-table-inventory.yml'

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inventory prompt table and override references
        shell: bash
        run: |
          {
            echo '## prompt table, accessors, loader override API, callers, and documentation'
            grep -RInE --exclude-dir=node_modules --exclude-dir=.git 'getPrompt|setPrompt|dbTemplate|includeSupplementsForDbTemplate|CREATE TABLE( IF NOT EXISTS)? prompts|DROP TABLE( IF EXISTS)? prompts|FROM prompts|INTO prompts|prompt_text|database[- ]backed prompt override|database prompt override|DB override' src test prompts docs || true
          } | tee prompt-table-inventory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: prompt-table-inventory
          path: prompt-table-inventory.txt
          if-no-files-found: error
