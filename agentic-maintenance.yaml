version: 1
status: canonical

roles:
  technical_lead:
    modes:
      - requirements
      - issue_validation
      - issue_authoring
      - decomposition_review
      - planning
      - planning_repair
      - executor_guidance
      - implementation_review
      - operations_review
      - pr_readiness
    default_permission: advisor_read_only
  code_worker:
    modes:
      - scan
      - investigate
      - red
      - green
      - repair
      - verify
    permissions:
      scan: repository_read_only
      investigate: repository_read_only
      red: test_only_mutation
      green: worktree_mutation
      repair: bounded_worktree_mutation
      verify: verification_only
  documentation_steward:
    modes:
      - impact
      - author
      - validate
      - maintenance
    permissions:
      impact: repository_read_only
      author: documentation_only
      validate: repository_read_only
      maintenance: documentation_only

canonical_documents:
  entry_point:
    - README.md
    - docs/README.md
  agent_policy:
    - AGENTS.md
  maintenance:
    - docs/agentic-maintenance.md
  worker_user_guide:
    - docs/WORKER-GUIDE.md
  architecture:
    - docs/architecture/01-current-architecture.md
    - docs/architecture/engineering-worker.md
    - docs/architecture/agentic-worker-orchestration.md
    - docs/architecture/agentic-prompt-contracts.md
    - docs/architecture/03-target-architecture.md
  prompt_contracts:
    - docs/architecture/agentic-prompt-contracts.md
  decisions:
    - docs/adr/ADR-005-role-based-agentic-orchestration.md
  roadmap:
    - docs/roadmap/issue-159-role-based-orchestration.md
  configuration:
    - docs/configuration/agent-role-assignment.md
  operations:
    - docs/operations/agentic-worker-runbook.md
  testing:
    - docs/testing/agentic-worker-verification.md
    - docs/architecture/08-testing-strategy.md
  production_readiness:
    - docs/architecture/10-production-readiness.md
  implementation_handoff:
    - docs/implementation-plans/issue-159-role-based-orchestration.md
    - docs/implementation-plans/issue-159-prompt-and-red-test-contract.md
    - docs/implementation-plans/issue-159-execution-readiness-safeguards.md

documentation_paths:
  allow:
    - README.md
    - AGENTS.md
    - "docs/**"
    - agentic-maintenance.yaml
  deny:
    - "src/**"
    - "test/**"
    - "scripts/**"
    - "systemd/**"
    - "package.json"
    - "package-lock.json"

change_triggers:
  role_contract:
    required:
      - maintenance
      - architecture
      - prompt_contracts
      - decisions
      - roadmap
      - configuration
      - testing
  requirements_or_issue_schema:
    required:
      - maintenance
      - worker_user_guide
      - prompt_contracts
      - roadmap
      - testing
      - implementation_handoff
  prompt_or_output_contract:
    required:
      - prompt_contracts
      - maintenance
      - worker_user_guide
      - roadmap
      - testing
      - production_readiness
      - implementation_handoff
  implementation_plan_schema:
    required:
      - prompt_contracts
      - maintenance
      - roadmap
      - testing
      - production_readiness
      - implementation_handoff
  provider_or_model_selection:
    required:
      - configuration
      - architecture
      - operations
      - testing
  permission_profile:
    required:
      - agent_policy
      - architecture
      - prompt_contracts
      - operations
      - testing
  workflow_state_or_lifecycle:
    required:
      - maintenance
      - architecture
      - operations
      - testing
      - production_readiness
      - implementation_handoff
  database_schema_or_migration:
    required:
      - architecture
      - operations
      - testing
      - production_readiness
  service_or_deployment:
    required:
      - operations
      - production_readiness
  user_command_or_status_surface:
    required:
      - entry_point
      - worker_user_guide
      - configuration
  documentation_policy:
    required:
      - agent_policy
      - maintenance
      - architecture
      - testing
      - production_readiness
      - implementation_handoff

workflow_contract:
  multi_issue_mutation_requires:
    - complete_read_only_issue_bundle
    - technical_lead_decomposition_review
    - canonical_invariant_matrix
    - ready_for_issue_mutation
  execution_preflight_requires:
    - clean_isolated_worktree
    - non_production_checkout
    - locked_dependencies_installable
    - required_repository_tools_available
    - focused_commands_executable
    - exact_base_and_head_resolved
    - required_independent_review_lane_available
  behavioural_mutation_blocked_when_execution_preflight_fails: true
  observed_red_requires:
    - focused_red_command_executed
    - expected_failure_confirmed
    - false_positive_controls_satisfied
    - no_unrelated_failure
    - required_sibling_characterization_green
  green_blocked_without_observed_red: true
  canonical_runtime_order:
    - deterministic_verification
    - technical_lead_implementation_review
    - technical_lead_operations_review_when_triggered
    - documentation_steward_author
    - documentation_steward_validate
    - technical_lead_pr_readiness
    - exact_head_ci
    - human_merge_gate
  code_change_invalidates:
    - deterministic_verification
    - technical_lead_implementation_review
    - technical_lead_operations_review
    - documentation_authoring
    - documentation_validation
    - pr_readiness
    - exact_head_ci
  exact_head_evidence_statuses:
    - passed
    - failed
    - not_run
    - not_scheduled
    - stale
    - unknown

stacked_pr_ci:
  pull_request_all_base_branches: true
  workflow_dispatch_supported: true
  exact_head_test_and_typecheck_required: true
  exact_head_architecture_lint_required: true
  intentionally_stacked_is_not_a_waiver: true

issue_mutation_integrity:
  required:
    - retain_exact_pre_mutation_body
    - retain_expected_revision_or_hash
    - compare_expected_current_revision_before_write
    - guarded_create_or_update
    - refetch_stored_result
    - semantic_post_write_validation
  semantic_validation_preserves:
    - validated_requirements
    - invariants
    - acceptance_criteria
    - evidence
    - non_goals
    - dependencies
    - human_gates
  conflict_or_failed_validation_blocks_workflow: true
  reconstruct_from_memory_on_failure: false

documentation_scope:
  trigger_bounded_changes_preferred: true
  broad_rewrite_requires_full_document_revalidation: true
  full_document_revalidation_requires:
    - current_code
    - commands
    - configuration
    - service_ownership
    - deployment
    - rollback
    - recovery
  unrelated_or_unproven_rewrite_blocks_readiness: true
  stale_required_document_must_be_corrected_same_delivery: true

readiness:
  require_documentation_impact: true
  allow_no_documentation_change: true
  no_documentation_change_requires:
    - rationale
    - technical_lead_validation
    - manifest_trigger_evaluation
  block_on_failed_execution_preflight: true
  block_on_unobserved_required_red: true
  block_on_missing_stacked_pr_ci: true
  block_on_failed_issue_mutation_integrity: true
  block_on_unrelated_or_unproven_documentation_rewrite: true
  block_on_missing_required_document: true
  block_on_stale_required_document: true
  block_on_contradictory_required_document: true
  block_on_materially_misleading_required_document: true
  require_same_delivery_documentation_correction: true
  deferral_satisfies_readiness: false
  block_on_non_current_head_evidence: true

independence:
  preference_order:
    - different_cli_and_model
    - different_model_same_cli
    - fresh_session_technical_lead
    - same_target_non_independent
  report_degradation: true
  record_required_and_actual_levels: true
  preflight_required_lane_before_behavioural_mutation: true
  block_when_required_level_unavailable: true

human_gates:
  - unresolved_product_decision
  - material_scope_change
  - merge
  - destructive_operation
  - production_deployment
  - secret_or_permission_change
  - policy_exception
