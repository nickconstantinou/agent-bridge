name: Prompt Override Retirement Candidate

on:
  pull_request:
    paths:
      - '.github/workflows/prompt-table-retirement-candidate.yml'
      - 'scripts/retirePromptOverridesCandidate.py'
      - 'scripts/retirePromptOverridesDocsCandidate.py'

permissions:
  contents: read

jobs:
  qualify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply candidate retirement
        shell: bash
        run: |
          set -o pipefail
          {
            python scripts/retirePromptOverridesCandidate.py
            python scripts/retirePromptOverridesDocsCandidate.py
          } 2>&1 | tee prompt-retirement-transform.log
      - name: Check retired references
        shell: bash
        run: |
          ! grep -RInE --exclude-dir=node_modules --exclude-dir=.git 'getPrompt|setPrompt|dbTemplate|includeSupplementsForDbTemplate|^[[:space:]]*dbKey:' src test prompts docs
          ! grep -n 'CREATE TABLE IF NOT EXISTS prompts' src/db/legacyBaselineMigration.ts
          ! grep -RInEi --exclude-dir=node_modules --exclude-dir=.git 'remain(s)? (a |an )?temporary legacy|remain(s)? available only|retained temporarily|staged retirement|current handlers still call|deprecated legacy override channel' prompts docs
      - name: Run focused tests
        run: >-
          npx vitest run
          test/workerPromptLoader.test.ts
          test/dbSchema.test.ts
          test/featurePlanHandler.test.ts
          test/defectScanHandler.test.ts
          test/handlers/refactorScan.test.ts
          test/implementationPlanHandler.test.ts
          test/orchestratedTaskHandler.test.ts
          test/tddImplementationHandler.test.ts
      - name: Run full suite
        run: npm test
      - name: Typecheck
        run: npm run typecheck
      - name: Architecture Lint
        run: bash scripts/arch-lint.sh src
      - name: Diff check
        run: git diff --check
      - name: Capture candidate
        if: always()
        shell: bash
        run: |
          git status --short > prompt-retirement-status.txt
          git diff --stat > prompt-retirement-stat.txt
          git diff > prompt-retirement.patch
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prompt-table-retirement-candidate
          path: |
            prompt-retirement-transform.log
            prompt-retirement-status.txt
            prompt-retirement-stat.txt
            prompt-retirement.patch
          if-no-files-found: error
